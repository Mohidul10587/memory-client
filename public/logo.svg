<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Background rounded square -->
  <rect width="48" height="48" rx="12" fill="url(#grad)"/>

  <!-- Graduation cap (mortarboard) -->
  <!-- Board top flat part -->
  <polygon points="24,10 40,18 24,26 8,18" fill="white" opacity="0.95"/>
  <!-- Cap stem + tassel base -->
  <rect x="22.5" y="25" width="3" height="9" rx="1.5" fill="white" opacity="0.85"/>
  <!-- Left side of cap hanging down -->
  <path d="M13 20v7c0 2.5 4.9 5 11 5s11-2.5 11-5v-7" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- Tassel dot -->
  <circle cx="37" cy="19" r="2" fill="white" opacity="0.7"/>
  <!-- Tassel line -->
  <line x1="37" y1="21" x2="37" y2="27" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="37" y1="27" x2="34" y2="31" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
</svg>
